<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receively — You're on the list</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --ink: #0e0e0e;
      --ink-2: #3a3a3a;
      --surface: #f7f5f0;
      --gold: #c9963a;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .check-icon {
      width: 64px;
      height: 64px;
      background: rgba(201, 150, 58, 0.15);
      color: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(201, 150, 58, 0.4);
      animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: fadeUp 0.8s ease both 0.2s;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }
    p {
      font-size: 1.1rem;
      color: #a0998c;
      max-width: 480px;
      line-height: 1.6;
      animation: fadeUp 0.8s ease both 0.3s;
      margin-bottom: 2rem;
    }
    .btn-return {
      display: inline-block;
      border: 1px solid #3a3a3a;
      color: #fff;
      text-decoration: none;
      padding: 0.8rem 2rem;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
      animation: fadeUp 0.8s ease both 0.4s;
    }
    .btn-return:hover {
      background: #fff;
      color: var(--ink);
      border-color: #fff;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="check-icon">✓</div>
  <h1>You're on the list.<br><em>See you soon.</em></h1>
  <p>Your spot is successfully secured. We'll send you an email as soon as your early access to Receively is ready.</p>
  <a href="index.html" class="btn-return">Return to beautiful homepage</a>
</body>
</html>
